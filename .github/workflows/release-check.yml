name: Release Check

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to validate (for release notes generation)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: .venv/bin/pip install -e '.[dev]'

      - name: Run tests
        run: PYTHONPATH=src .venv/bin/pytest -q

      - name: Generate release notes draft
        run: python3 scripts/release/create_release_notes.py --version "${{ inputs.version }}"

      - name: Upload release notes artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-notes-${{ inputs.version }}
          path: docs/release/RELEASE_NOTES_DRAFT.md
          if-no-files-found: error
