name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Dependency Review
        uses: actions/dependency-review-action@e93faf2ab2f3663b51bc6e62d42b8520f2eff874
